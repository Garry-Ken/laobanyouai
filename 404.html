<!doctype html>
<html lang="zh-CN" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面不存在 — 老板有AI</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090c" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      ;(function () {
        try {
          var s = localStorage.getItem('lby-theme')
          var d = s ? s === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
          if (d) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/entries/notfound.tsx"></script>
  </body>
</html>
